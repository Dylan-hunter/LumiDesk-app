name: Build LumiDesk Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Upgrade pip
        run: python -m pip install --upgrade pip setuptools wheel

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build EXE
        run: pyinstaller --clean --noconfirm LumiDesk.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LumiDesk-Windows-EXE
          path: |
            dist/LumiDesk.exe
            dist/*.exe
            dist/
          if-no-files-found: error
